version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"

  # docs/evaluation/requirements-frozen.txt is a pinned evaluation snapshot —
  # disable Dependabot PRs for it entirely
  - package-ecosystem: "pip"
    directory: "/docs/evaluation"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # npm dependencies (frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "javascript"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
