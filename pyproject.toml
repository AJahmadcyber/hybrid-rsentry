[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
# F-series only: unused imports (F401), undefined names (F811), unused vars (F841)
# E/W style rules excluded — the codebase uses inline ifs, lambdas, and multi-imports
# by design (agent hot-paths, eBPF fallback guards).
select = ["F"]
ignore = [
    "F403",  # star imports — used in some agent compatibility shims
    "F405",  # may be undefined from star import
]
exclude = [
    "venv/",
    "node_modules/",
    "landing/",
    ".git/",
    "frontend/",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
    "unit: fast isolated tests with mocked dependencies",
    "integration: requires running services (Redis, Postgres)",
]
